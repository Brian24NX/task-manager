spring.application.name=task-manager-backend
server.port=8080

spring.datasource.url=jdbc:h2:mem:tasks;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=update
spring.jpa.open-in-view=false
spring.h2.console.enabled=true

# Single-user login credentials
app.auth.username=${APP_AUTH_USERNAME:Brian}
app.auth.password=${APP_AUTH_PASSWORD:admin123}

# Resend email API (set via environment variable)
resend.api-key=${RESEND_API_KEY:}

# Twilio SMS (set via environment variables)
twilio.account-sid=${TWILIO_ACCOUNT_SID:}
twilio.auth-token=${TWILIO_AUTH_TOKEN:}
twilio.phone-number=${TWILIO_PHONE_NUMBER:}

# Daily reminder for tasks due today
reminder.enabled=${REMINDER_ENABLED:false}
reminder.email=${REMINDER_EMAIL:}
reminder.phone=${REMINDER_PHONE:}
reminder.cron=${REMINDER_CRON:0 0 8 * * *}
reminder.timezone=${REMINDER_TZ:America/Chicago}
