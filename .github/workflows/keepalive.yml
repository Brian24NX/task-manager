name: Keep API Awake

on:
  schedule:
    - cron: "*/10 * * * *"
  workflow_dispatch:

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping API stats endpoint
        run: |
          curl -fsS --max-time 60 --retry 3 --retry-delay 5 \
            https://task-manager-api-3f3d.onrender.com/api/tasks/stats \
            -o /dev/null -w "HTTP %{http_code} in %{time_total}s\n"
