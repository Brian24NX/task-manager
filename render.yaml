databases:
  - name: task-manager-db
    plan: free
    databaseName: taskmanager
    user: taskmanager

services:
  - type: web
    name: task-manager-api
    runtime: java
    plan: free
    buildCommand: cd backend && mvn clean package -DskipTests
    startCommand: cd backend && java -Dspring.profiles.active=prod -jar target/task-manager-backend-0.0.1-SNAPSHOT.jar
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: task-manager-db
          property: connectionString
      - key: DATABASE_USERNAME
        fromDatabase:
          name: task-manager-db
          property: user
      - key: DATABASE_PASSWORD
        fromDatabase:
          name: task-manager-db
          property: password

  - type: web
    name: task-manager-frontend
    runtime: static
    plan: free
    buildCommand: cd frontend && npm install && npm run build
    staticPublishPath: frontend/dist
    routes:
      - type: rewrite
        source: /api/*
        destination: https://task-manager-api.onrender.com/api/*
    headers:
      - path: /*
        name: Cache-Control
        value: public, max-age=0, must-revalidate
